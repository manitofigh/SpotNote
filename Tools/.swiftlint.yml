included:
  - ../Sources
  - ../Tests

excluded:
  - ../.build
  - ../build
  - ../.swiftpm

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - convenience_type
  - discouraged_optional_boolean
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_imports
  - strict_fileprivate
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - line_length              # handled by swift-format
  - todo                     # tickets are in the tracker
  - blanket_disable_command  # file-level disables are intentional and documented in-source
  - superfluous_disable_command  # avoids churn when a violation is fixed but the disable stays

cyclomatic_complexity:
  warning: 10
  error: 15
function_body_length:
  warning: 40
  error: 80
type_body_length:
  warning: 250
  error: 400
file_length:
  warning: 400
  error: 700
  ignore_comment_only_lines: true
identifier_name:
  min_length: 2
  excluded: [id, x, y, z, i, j, k, to, at, on]

reporter: "xcode"
